<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>キーボード配列</title>
<style>
.contena {
  display: inline-block;
  border:solid 1px #ddd;
  padding:10px;
	transform-origin: top left;
  transform: scale(2);
}
.KB {
  padding:10px;
  border:none;
  display: inline-block;
	transform-origin: top left;
  transform: scale(1);
}

button {
	width:32px;
	height:32px;
	font-size:20px;
	margin-bottom:8px;
	margin-right:2px;
}

#edit {
	width:181px;
	height:24px;
	font-size:18px;
	margin-right:3px;

}

#BS {
	width:32px;
	font-size:12px;
}

#speak {
	width:32px;
	font-size:12px;
}
</style>
</head>
<body>
<div class="contena">
<input id="edit" type="text"></input>
<button id="BS">⌫</button>
<button id="speak">🔊</button>
<br>
<div id="KB">
<button>A</button>
<button>B</button>
<button>C</button>
<button>D</button>
<button>E</button>
<button>F</button>
<button>G</button>
<br>
<button>H</button>
<button>I</button>
<button>J</button>
<button>K</button>
<button>L</button>
<button>M</button>
<button>N</button>
<br>
<button>O</button>
<button>P</button>
<button>Q</button>
<button>R</button>
<button>S</button>
<button>T</button>
<button>U</button>
<br>
<button>V</button>
<button>W</button>
<button>X</button>
<button>Y</button>
<button>Z</button>
</div>
</div>
<script src="voice.js" defer></script>
</body>
</html>
